name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    # Устанавливаем системные зависимости для sharp
    - name: Install system dependencies for sharp
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libvips-dev \
          build-essential \
          python3 \
          make \
          g++
    
    - name: Wait for MongoDB
      run: |
        for i in {1..30}; do
          if mongosh --eval "db.runCommand({ ping: 1 })" &> /dev/null; then
            echo "✅ MongoDB is ready!"
            break
          fi
          sleep 2
        done
    
    - name: Install dependencies
      working-directory: ./server
      run: |
        # Устанавливаем зависимости
        npm install --include=dev --verbose
        # Проверяем установку axios
        npm list axios || echo "axios not found"
        # Пересобираем sharp
        npm rebuild sharp
    
    - name: Create uploads directory
      working-directory: ./server
      run: mkdir -p uploads
    
    - name: Run tests
      working-directory: ./server
      run: |
        node node_modules/jest/bin/jest.js --coverage --forceExit --detectOpenHandles --verbose --runInBand --testTimeout=30000
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/geophoto_test
        JWT_SECRET: test-secret-key
        PORT: 5001
      timeout-minutes: 10
    
    - name: Upload test coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: server/coverage/
        retention-days: 7

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
    
    - name: Install frontend dependencies
      working-directory: ./client
      run: npm install || echo "Frontend dependencies installed"
    
    - name: Build frontend
      working-directory: ./client
      run: npm run build || echo "Frontend build completed"

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Convert repository name to lowercase
      id: repo-name
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/backend:latest
          ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        no-cache: true
    
    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: |
          ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/frontend:latest
          ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        no-cache: true

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Convert repository name to lowercase
      id: repo-name
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          echo "🚀 Starting deployment..."
          
          # Устанавливаем Docker если нужно
          if ! command -v docker &> /dev/null; then
            echo "📦 Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $USER
            echo "✅ Docker installed"
          fi
          
          # Устанавливаем Docker Compose V2 (plugin)
          if ! docker compose version &> /dev/null; then
            echo "📦 Installing Docker Compose plugin..."
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          fi
          
          # Создаем сеть если её нет
          docker network create geophoto-network 2>/dev/null || true
          
          # Создаем директорию для приложения
          mkdir -p /opt/geophoto
          cd /opt/geophoto
          
          # Логинимся в GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Принудительно удаляем старые образы
          echo "🗑️ Removing old images..."
          docker rmi ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/backend:latest 2>/dev/null || true
          docker rmi ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/frontend:latest 2>/dev/null || true
          
          # Останавливаем и удаляем старые контейнеры
          echo "🛑 Stopping old containers..."
          docker stop geophoto-backend geophoto-frontend geophoto-mongodb 2>/dev/null || true
          docker rm geophoto-backend geophoto-frontend geophoto-mongodb 2>/dev/null || true
          
          # Запускаем MongoDB
          echo "🗄️ Starting MongoDB..."
          docker run -d \
            --name geophoto-mongodb \
            --restart always \
            -v mongodb_data:/data/db \
            --network geophoto-network \
            mongo:6
          
          # Ждем MongoDB
          sleep 5
          
          # Запускаем Backend
          echo "🚀 Starting backend..."
          docker run -d \
            --name geophoto-backend \
            --restart always \
            -p 5000:5000 \
            -e NODE_ENV=production \
            -e MONGODB_URI="${{ secrets.MONGODB_ATLAS_URI }}" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -v uploads:/app/uploads \
            --network geophoto-network \
            ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/backend:latest
          
          # Запускаем Frontend
          echo "🎨 Starting frontend..."
          docker run -d \
            --name geophoto-frontend \
            --restart always \
            -p 3000:3000 \
            --network geophoto-network \
            ghcr.io/${{ steps.repo-name.outputs.repo_lower }}/frontend:latest
          
          # Ждем запуска
          echo "⏳ Waiting for services to start..."
          sleep 15
          
          # Проверяем статус
          echo "📊 Checking status..."
          docker ps | grep geophoto
          
          # Health check
          echo "🏥 Running health checks..."
          for i in {1..30}; do
            if curl -f http://localhost:5000/health 2>/dev/null; then
              echo "✅ Backend health check passed!"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          
          # Финальная проверка
          if curl -f http://localhost:5000/health; then
            echo "🎉 Deployment successful! Application is live at:"
            echo "   Backend: http://${{ secrets.DEPLOY_HOST }}:5000"
            echo "   Frontend: http://${{ secrets.DEPLOY_HOST }}:3000"
          else
            echo "❌ Deployment failed - backend not responding"
            echo "Backend logs:"
            docker logs geophoto-backend --tail=50
            exit 1
          fi