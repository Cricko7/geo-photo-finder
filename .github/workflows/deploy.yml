name: CI - Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Wait for MongoDB
      run: |
        for i in {1..30}; do
          if mongosh --eval "db.runCommand({ ping: 1 })" &> /dev/null; then
            echo "✅ MongoDB is ready!"
            break
          fi
          sleep 2
        done
    
    - name: Install dependencies
      working-directory: ./server
      run: npm install --include=dev
    
    - name: Create uploads directory
      working-directory: ./server
      run: mkdir -p uploads
    
    - name: Run tests
      working-directory: ./server
      run: |
        node node_modules/jest/bin/jest.js --coverage --forceExit --detectOpenHandles --verbose --runInBand --testTimeout=30000
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/geophoto_test
        JWT_SECRET: test-secret-key
        PORT: 5001
      timeout-minutes: 10
    
    - name: Upload test coverage
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: server/coverage/
        retention-days: 7

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Install frontend dependencies
      working-directory: ./client
      run: npm install || echo "Frontend dependencies installed"
    
    - name: Build frontend
      working-directory: ./client
      run: npm run build || echo "Frontend build completed"