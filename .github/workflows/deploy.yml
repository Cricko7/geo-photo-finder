  # 🚀 Деплой на сервер
  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Convert repository name to lowercase
      id: repo-name
      run: |
        REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
    
    - name: Deploy to production server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          echo "🚀 Starting deployment..."
          
          # Проверяем и устанавливаем Docker если нужно
          if ! command -v docker &> /dev/null; then
            echo "📦 Installing Docker..."
            curl -fsSL https://get.docker.com -o get-docker.sh
            sudo sh get-docker.sh
            sudo usermod -aG docker $USER
            echo "✅ Docker installed"
          fi
          
          # Создаем директорию для приложения
          mkdir -p /opt/geophoto
          cd /opt/geophoto
          
          # Создаем docker-compose.yml (исправленный)
          cat > docker-compose.yml << 'EOF'
          version: '3.8'
          
          services:
            mongodb:
              image: mongo:6
              container_name: geophoto-mongodb
              restart: always
              volumes:
                - mongodb_data:/data/db
              networks:
                - geophoto-network
              ports:
                - "27017:27017"
            
            backend:
              image: ghcr.io/cricko7/geo-photo-finder/backend:latest
              container_name: geophoto-backend
              restart: always
              ports:
                - "5000:5000"
              environment:
                - NODE_ENV=production
                - MONGODB_URI=mongodb://mongodb:27017/geophoto
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
                - PORT=5000
              depends_on:
                - mongodb
              volumes:
                - uploads:/app/uploads
              networks:
                - geophoto-network
            
            frontend:
              image: ghcr.io/cricko7/geo-photo-finder/frontend:latest
              container_name: geophoto-frontend
              restart: always
              ports:
                - "3000:3000"
              depends_on:
                - backend
              networks:
                - geophoto-network
          
          volumes:
            mongodb_data:
            uploads:
          
          networks:
            geophoto-network:
              driver: bridge
          EOF
          
          # Логинимся в GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Пытаемся использовать docker compose (новая версия) или docker-compose (старая)
          echo "📦 Pulling latest images..."
          if docker compose version &> /dev/null; then
            docker compose pull
            docker compose down
            docker compose up -d
            DOCKER_CMD="docker compose"
          else
            docker-compose pull
            docker-compose down
            docker-compose up -d
            DOCKER_CMD="docker-compose"
          fi
          
          # Очищаем неиспользуемые образы
          echo "🧹 Cleaning up..."
          docker image prune -f
          
          # Ждем запуска
          echo "⏳ Waiting for services to start..."
          sleep 15
          
          # Проверяем статус
          echo "📊 Checking status..."
          if [ "$DOCKER_CMD" = "docker compose" ]; then
            docker compose ps
          else
            docker-compose ps
          fi
          
          # Health check с повторными попытками
          echo "🏥 Running health checks..."
          
          # Проверяем backend
          RETRIES=30
          for i in $(seq 1 $RETRIES); do
            if curl -f http://localhost:5000/health 2>/dev/null; then
              echo "✅ Backend health check passed!"
              break
            fi
            echo "Waiting for backend... ($i/$RETRIES)"
            sleep 2
          done
          
          # Проверяем frontend
          for i in $(seq 1 $RETRIES); do
            if curl -f http://localhost:3000 2>/dev/null; then
              echo "✅ Frontend health check passed!"
              break
            fi
            echo "Waiting for frontend... ($i/$RETRIES)"
            sleep 2
          done
          
          # Финальная проверка
          if curl -f http://localhost:5000/health; then
            echo "🎉 Deployment successful! Application is live at:"
            echo "   Backend: http://${{ secrets.DEPLOY_HOST }}:5000"
            echo "   Frontend: http://${{ secrets.DEPLOY_HOST }}:3000"
          else
            echo "❌ Deployment failed - backend not responding"
            echo "Backend logs:"
            if [ "$DOCKER_CMD" = "docker compose" ]; then
              docker compose logs backend --tail=50
            else
              docker-compose logs backend --tail=50
            fi
            exit 1
          fi