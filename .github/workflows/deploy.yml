name: Deploy to Production

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    # Backend тестирование
    - name: Setup backend
      working-directory: ./server
      run: |
        # Создаем package-lock.json если его нет
        if [ ! -f package-lock.json ]; then
          npm install --package-lock-only
        fi
        npm ci
    
    - name: Run backend tests
      working-directory: ./server
      run: npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/geophoto_test
        JWT_SECRET: test-secret-key
        PORT: 5001
    
    # Frontend тестирование
    - name: Setup frontend
      working-directory: ./client
      run: |
        # Создаем package-lock.json если его нет
        if [ ! -f package-lock.json ]; then
          npm install --package-lock-only
        fi
        npm ci
    
    - name: Run frontend tests
      working-directory: ./client
      run: npm test -- --watchAll=false --passWithNoTests
      env:
        CI: true
    
    - name: Build frontend
      working-directory: ./client
      run: npm run build

  # Линтинг и проверка кода
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Lint backend
      working-directory: ./server
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        npm run lint || true  # Не проваливаем сборку если нет линтера
    
    - name: Lint frontend
      working-directory: ./client
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        npm run lint || true

  # Сборка Docker образов
  build-and-push:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Деплой на сервер
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /opt/geophoto
          
          # Создаем .env файл если его нет
          if [ ! -f .env ]; then
            cat > .env << EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            NODE_ENV=production
            ENABLE_AI_ANALYSIS=true
            EOF
          fi
          
          # Pull последние образы
          docker-compose pull
          
          # Перезапускаем сервисы
          docker-compose up -d --remove-orphans
          
          # Очищаем неиспользуемые образы
          docker image prune -f
          
          # Проверяем статус
          docker-compose ps
          
          # Health check
          sleep 10
          curl -f http://localhost:5000/health || exit 1

  # Уведомление о деплое
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send notification
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ needs.deploy.result }}';
          const message = status === 'success' 
            ? '✅ Deployment successful!' 
            : '❌ Deployment failed!';
          
          console.log(message);