name: Deploy to Production

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    # Устанавливаем зависимости для backend
    - name: Install backend dependencies
      working-directory: ./server
      run: |
        # Создаем package-lock.json если его нет
        if [ ! -f package-lock.json ]; then
          npm install --package-lock-only
        fi
        npm install
    
    - name: Create uploads directory
      working-directory: ./server
      run: mkdir -p uploads
    
    - name: Run backend tests
      working-directory: ./server
      run: npm test
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/geophoto_test
        JWT_SECRET: test-secret-key
        PORT: 5001
      timeout-minutes: 5

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Install frontend dependencies
      working-directory: ./client
      run: |
        if [ ! -f package-lock.json ]; then
          npm install --package-lock-only
        fi
        npm install
    
    - name: Run frontend tests
      working-directory: ./client
      run: npm test -- --watchAll=false --passWithNoTests || true
      env:
        CI: true
    
    - name: Build frontend
      working-directory: ./client
      run: npm run build || true

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Lint backend
      working-directory: ./server
      run: |
        npm install
        npm run lint 2>&1 || echo "Linting issues found but continuing"
      continue-on-error: true
    
    - name: Lint frontend
      working-directory: ./client
      run: |
        npm install
        npm run lint 2>&1 || echo "Linting issues found but continuing"
      continue-on-error: true

  build-and-push:
    needs: [test-backend, test-frontend, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /opt/geophoto
          
          # Создаем .env файл если его нет
          if [ ! -f .env ]; then
            cat > .env << EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            NODE_ENV=production
            ENABLE_AI_ANALYSIS=true
            OLLAMA_URL=http://ollama:11434
            EOF
          fi
          
          # Pull последние образы
          docker-compose pull
          
          # Перезапускаем сервисы
          docker-compose up -d --remove-orphans
          
          # Очищаем неиспользуемые образы
          docker image prune -f
          
          # Проверяем статус
          sleep 10
          docker-compose ps
          
          # Health check
          curl -f http://localhost:5000/health || exit 1