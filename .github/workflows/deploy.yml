name: Deploy to Production

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Wait for MongoDB
      run: |
        echo "Waiting for MongoDB to start..."
        for i in {1..30}; do
          if mongosh --eval "db.runCommand({ ping: 1 })" &> /dev/null; then
            echo "MongoDB is ready!"
            break
          fi
          echo "Attempt $i: MongoDB not ready yet..."
          sleep 2
        done
    
    - name: Install backend dependencies
      working-directory: ./server
      run: |
        npm install --include=dev
        # Даем права на выполнение для jest
        chmod +x node_modules/.bin/jest || true
        echo "Jest installed at: $(which jest || echo 'not in PATH')"
        ls -la node_modules/.bin/ | head -20
    
    - name: Create uploads directory
      working-directory: ./server
      run: mkdir -p uploads
    
    - name: Run backend tests
      working-directory: ./server
      run: |
        # Используем node для запуска jest напрямую
        node node_modules/jest/bin/jest.js --coverage --forceExit --detectOpenHandles --verbose --runInBand --testTimeout=30000
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/geophoto_test
        JWT_SECRET: test-secret-key
        PORT: 5001
      timeout-minutes: 10

  # Опционально: сборка Docker образов
  build-and-push:
    needs: [test-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/geophoto-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to production server
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /opt/geophoto || exit 1
          
          if [ ! -f .env ]; then
            cat > .env << EOF
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            NODE_ENV=production
            ENABLE_AI_ANALYSIS=false
            EOF
          fi
          
          docker-compose pull
          docker-compose up -d --remove-orphans
          docker image prune -f
          sleep 10
          docker-compose ps
          curl -f http://localhost:5000/health || exit 1