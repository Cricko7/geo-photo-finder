version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: geophoto-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: geophoto
    volumes:
      - mongodb_data:/data/db
    networks:
      - geophoto-network

  ollama:
    image: ollama/ollama:latest
    container_name: geophoto-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - geophoto-network
    command: serve

  backend:
    build: ./server
    container_name: geophoto-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/geophoto?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
      OLLAMA_URL: http://ollama:11434
      ENABLE_AI_ANALYSIS: "true"
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
      - ollama
    volumes:
      - uploads:/app/uploads
    networks:
      - geophoto-network

  frontend:
    build: ./client
    container_name: geophoto-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_MAP_TILE: https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png
    depends_on:
      - backend
    networks:
      - geophoto-network

  nginx:
    image: nginx:alpine
    container_name: geophoto-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - geophoto-network

volumes:
  mongodb_data:
  ollama_data:
  uploads:

networks:
  geophoto-network:
    driver: bridge