version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: geophoto-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - geophoto-network
    ports:
      - "27017:27017"
  
  ollama:
    image: ollama/ollama:latest
    container_name: geophoto-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - geophoto-network
    ports:
      - "11434:11434"
    command: serve
  
  backend:
    image: ghcr.io/cricko7/geo-photo-finder/backend:latest
    container_name: geophoto-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/geophoto
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
      - OLLAMA_URL=http://ollama:11434
      - ENABLE_AI_ANALYSIS=true
    depends_on:
      - mongodb
      - ollama
    volumes:
      - uploads:/app/uploads
    networks:
      - geophoto-network
  
  frontend:
    image: ghcr.io/cricko7/geo-photo-finder/frontend:latest
    container_name: geophoto-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - geophoto-network

volumes:
  mongodb_data:
  ollama_data:
  uploads:

networks:
  geophoto-network:
    driver: bridge